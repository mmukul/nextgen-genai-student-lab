application:
  name: NextGen GenAI Student Lab
  version: 0.1.0

server:
  host: 0.0.0.0
  api_port: 8000
  streamlit_port: 8501

ollama:
  host: http://localhost:11434
  model: llama3.2:3b

directories:
  uploads: uploads
  documents: documents
  chroma: chroma_db
  logs: logs

features:
  ai_chat: true
  prompt_playground: true
  rag: false
  agents: false
  ai_security: false

logging:
  level: INFO
